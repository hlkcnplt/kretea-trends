spring:
  application:
    name: kretea-trends-api
  profiles:
    active: local
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db.zmczdrsntfufzukcydaf.supabase.co:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

kretea:
  auth:
    secret: ${KRETEA_AUTH_SECRET:default_secret_dev}

cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}

