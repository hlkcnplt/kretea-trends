spring:
  application:
    name: kretea-trends-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}

kretea:
  auth:
    secret: ${KRETEA_AUTH_SECRET:default_secret_dev}
  rate-limit:
    capacity: ${RATE_LIMIT_CAPACITY:100}
    minutes: ${RATE_LIMIT_MINUTES:1}

cors:
  allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}

